name: Full Content Audit
description: >
  Comprehensive content quality audit. The Generalist scans for overall issues,
  then the Tone Evaluator checks voice, the Accessibility Auditor flags a11y issues,
  and the Microcopy Reviewer polishes the final output. Each step receives the
  original content plus all previous findings.

steps:
  - name: generalist_scan
    agent: generalist
    input_map:
      content_or_context: "$input.content"
      brand_guidelines: "$input.brand_guidelines"
      target_audience: "$input.target_audience"
    output_key: generalist_result

  - name: tone_check
    agent: tone
    input_map:
      content: "$input.content"
      target_tone: "$input.target_tone"
      brand_voice_guide: "$input.brand_guidelines"
      channel: "$input.channel"
    output_key: tone_result

  - name: accessibility_audit
    agent: a11y
    input_map:
      content: "$input.content"
      content_type: "$input.content_type"
      target_audience: "$input.target_audience"
    output_key: a11y_result

  - name: microcopy_polish
    agent: microcopy
    input_map:
      microcopy: "$input.content"
      ui_context: "$input.ui_context"
      brand_voice: "$input.brand_guidelines"
    output_key: microcopy_result
